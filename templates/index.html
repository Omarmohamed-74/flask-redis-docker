<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visitor Counter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .count {
      font-size: 60px;
      font-weight: bold;
      color: #00ffcc;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00c2a8;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🐳 Visitor Counter</h1>

    <div class="count">
      {{ count }}
    </div>

    <p>Total Visitors</p>

    <button class="btn" onclick="location.reload()">Refresh</button>
  </div>

</body>
</html>
